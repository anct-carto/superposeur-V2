<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>À propos — Superposeur ANCT</title>
    <style>
        :root {
            --color-accent: #003189;
            --color-border: #e0e0e0;
            --color-text-main: #1a1a2e;
            --color-text-muted: #4a4a6a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Marianne, system-ui, sans-serif;
            color: var(--color-text-main);
            line-height: 1.6;
            max-width: 720px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--color-accent);
            margin-bottom: 32px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--color-accent);
        }
        h2 {
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--color-text-muted);
            margin: 32px 0 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--color-border);
        }
        p, li { font-size: 0.95rem; color: var(--color-text-muted); }
        ul { list-style: none; margin-top: 6px; }
        li { margin-bottom: 4px; }
        a.contact {
            display: inline-block;
            margin-top: 8px;
            color: var(--color-accent);
            font-weight: 600;
            text-decoration: none;
        }
        a.contact:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <h1>À propos</h1>

    <h2>Sources</h2>
    <ul>
        <li>ANCT - 2026</li>
        <li>SIGVille - 2024</li>
        <li>Insee – typologie en 7 classes des communes</li>
        <li>Acadie / Magali Talandier – typologie de la diversité des ruralités des communes</li>
        <li>Inrae / Caesar - 2021 – typologie des centralités</li>
    </ul>

    <h2>Contact</h2>
    <a href="mailto:cartographie@anct.gouv.fr" class="contact">cartographie@anct.gouv.fr</a>

</body>
</html>
